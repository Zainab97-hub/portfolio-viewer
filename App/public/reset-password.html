<!-- resetPassword.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Passwort zurücksetzen</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="login-container">
        <h1 class="h2">Passwort zurücksetzen</h1>
        <form id="resetPasswordForm" class="form-group">
          <label class="label" for="new-password">Neues Passwort:</label>
          <input class="input" type="password" id="new-password" name="newPassword" required />
          <label class="label" for="confirm-password">Neues Passwort bestätigen:</label>
          <input class="input" type="password" id="confirm-password" name="confirmPassword" required />
          <button class="button" type="submit">Passwort zurücksetzen</button>
        </form>
      </div>
    </div>
    <script src="./js/reset-password.js"></script>
  </body>
</html>
