<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Viewer</title>
    <link rel="stylesheet" href="style.css" />
    <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"
  />
  <script
    type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"
  ></script>
  </head>
  <body>
    <span id="nbtn" class="navbtn">&#9674;</span>
    <div id="mySidenav" class="sidenav">
      <span class="closebtn">&#9664;</span>
      <div id="mySidenSpan">
        <span onclick="window.location.href='/home'">Home</span>
        <span id="profileButton" onclick="window.location.href='/profile'" style="display: none" > Profil </span>
        <span id="visitorButton" onclick="window.location.href='/visitor'" style="display: none"> Viewer </span>
        <span id="adminButton" onclick="window.location.href='/admin'" style="display: none" > Editor </span>
        <span id="studentButton" onclick="window.location.href='/student'" style="display: none" > Editor </span>
        <span id="verwaltungsButton"  onclick="window.location.href='/users-Verwalten'" style="display: none" >Benutzer</span>
        <span onclick="window.location.href=''">3D-Raum</span>

      </div>
    </div>
    <div class="map-wrapper">
      <div class="controls">
        <img src="./images/logor.png" width="100px" height="40px" alt="Logo" />
        <button id="loginButton" onclick="window.location.href='/login'"> Einloggen </button>
        <button id="registerButton" onclick="window.location.href='/register'" "> Registrieren </button>
        <button id="logoutButton" style="display: none" onclick="logout()">Ausloggen</button>
      </div>
    <div class="content">
      <div id="panorama" style="width: 100%; height: 100%"></div>
    </div>
    <footer>
      <span class="menu" onclick="window.location.href='https://mr.uni-wuppertal.de/mr/kontakt-service/sekretariat'">Kontakt</span>
      <span class="menu" onclick="window.location.href='https://mr.uni-wuppertal.de/impressum'">Impressum</span>
      <span class="menu" onclick="window.location.href='https://mr.uni-wuppertal.de/datenschutz'">Datenschutz</span>
      <span class="menu" onclick="window.location.href='/license'">LICENSE</span>
    </footer>
    <script>
      pannellum.viewer("panorama", {
        type: "equirectangular",
        panorama: "./images/Ausstellung_360Grad_Panorama.jpg",
        autoLoad: true,
      });
    </script>
    <script src="./js/nav.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/navigation.js"></script>
  </body>
</html>
